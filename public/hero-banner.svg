<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#090909"/>
      <stop offset="50%" stop-color="#0a0f0d"/>
      <stop offset="100%" stop-color="#090909"/>
    </linearGradient>
    <radialGradient id="glow1" cx="200" cy="200" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(16,185,129,0.12)"/>
      <stop offset="100%" stop-color="rgba(16,185,129,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="900" cy="250" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(245,158,11,0.06)"/>
      <stop offset="100%" stop-color="rgba(245,158,11,0)"/>
    </radialGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="rgba(16,185,129,0)"/>
      <stop offset="20%" stop-color="rgba(16,185,129,0.3)"/>
      <stop offset="80%" stop-color="rgba(16,185,129,0.3)"/>
      <stop offset="100%" stop-color="rgba(16,185,129,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#glow1)"/>
  <rect width="1200" height="400" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
  </g>

  <!-- Radar icon -->
  <g transform="translate(540, 80)">
    <rect width="80" height="80" rx="18" fill="#111"/>
    <rect width="80" height="80" rx="18" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <circle cx="40" cy="40" r="24" stroke="rgba(255,255,255,0.1)" stroke-width="2.5"/>
    <circle cx="40" cy="40" r="15" stroke="rgba(16,185,129,0.4)" stroke-width="2.5"/>
    <path d="M40 14C53 14 64 22 67 33" stroke="#F59E0B" stroke-width="4" stroke-linecap="round"/>
    <path d="M20 48C23 60 34 68 48 69" stroke="#E5E7EB" stroke-width="4" stroke-linecap="round"/>
    <circle cx="40" cy="40" r="5" fill="#10B981"/>
    <circle cx="40" cy="40" r="1.8" fill="#E5E7EB"/>
  </g>

  <!-- Title -->
  <text x="600" y="210" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="-1">Scout</text>

  <!-- Subtitle -->
  <text x="600" y="248" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400">Autonomous pre-call research for commercial insurance brokers</text>

  <!-- Accent line -->
  <rect x="0" y="285" width="1200" height="1" fill="url(#line-grad)"/>

  <!-- Tech badges -->
  <g transform="translate(365, 310)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <text x="40" y="18" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Next.js 16</text>

    <rect x="95" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <text x="140" y="18" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="system-ui, sans-serif" font-size="11" font-weight="500">TypeScript</text>

    <rect x="200" y="0" width="70" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <text x="235" y="18" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="system-ui, sans-serif" font-size="11" font-weight="500">React 19</text>

    <rect x="285" y="0" width="110" height="28" rx="14" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.15)" stroke-width="0.5"/>
    <text x="340" y="18" text-anchor="middle" fill="rgba(16,185,129,0.7)" font-family="system-ui, sans-serif" font-size="11" font-weight="500">AI Synthesis</text>

    <rect x="410" y="0" width="100" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <text x="460" y="18" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Risk Engine</text>
  </g>

  <!-- Bottom fade -->
  <rect x="0" y="370" width="1200" height="30" fill="url(#bg)" opacity="0.8"/>
</svg>
